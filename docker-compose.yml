version: '3.9'

# ═══════════════════════════════════════════════════════════════
#  Spring AI Lab — Docker Compose
#
#  What this gives you:
#    · PostgreSQL 16 with pgvector extension installed
#    · pgvector is the vector store for RAG (Hours 5 & 6)
#    · pgAdmin for visual DB exploration (optional, port 5050)
#
#  Start:  docker compose up -d
#  Stop:   docker compose down
#  Reset:  docker compose down -v   (wipes all data)
# ═══════════════════════════════════════════════════════════════

services:

  postgres:
    image: pgvector/pgvector:pg16          # Official image with pgvector pre-installed
    container_name: ailab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ailab
      POSTGRES_USER: ailab
      POSTGRES_PASSWORD: ailab123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql   # runs on first start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ailab -d ailab"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ailab-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ailab.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
